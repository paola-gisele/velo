# Workflow de Integração Contínua focado EXCLUSIVAMENTE em testes unitários.
# - Usa Node.js 24, Yarn (via Corepack) e Vitest.
# - Executa "yarn test" (script: "vitest run").
# - Estruturado para facilitar expansão futura (ex.: novos jobs), mantendo apenas 1 job conforme restrições.

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: "24" # Versão do Node.js definida como variável global para fácil manutenção
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} # Token do Vercel armazenado como segredo para segurança
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # ID do projeto Vercel para deploy
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }} # ID da organização Vercel para deploy
  VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }} # Escopo do Vercel para deploy (geralmente o nome da equipe ou usuário)

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # Permissões mínimas necessárias para checkout

    steps:
      # Passo 1: Obter o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Passo 2: Preparar ambiente Node.js utilizando a versão global definida
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Passo 3: Habilitar Corepack para usar Yarn gerenciado pela versão do Node
      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Passo 4: Instalar dependências conforme yarn.lock
      - name: Install dependencies
        run: yarn install

      # Passo 5: Executar testes unitários com Vitest
      - name: Run unit tests
        run: yarn test

  build-and-deploy:
    name: Build and Deploy Vercel Preview
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Obter o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Passo 2: Preparar ambiente Node.js utilizando a versão global definida
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Passo 3: Habilitar Corepack para usar Yarn gerenciado pela versão do Node
      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Passo 4: Instalar dependências conforme yarn.lock
      - name: Install dependencies
        run: yarn install

      # Passo 5: Obter as configurações do vercel
      - name: Pull Vercel Config
        run: yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE

      # Passo 6: Build para o Vercel
      - name: Build for Vercel
        run: yarn vercel build --token=$VERCEL_TOKEN

      # Passo 7: Deploy preview no vercel
      - name: Deploy to preview
        run: yarn vercel deploy --prebuilt --target=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE
