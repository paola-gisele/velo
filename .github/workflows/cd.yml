# Workflow de Integração Contínua focado EXCLUSIVAMENTE em testes unitários.
# - Usa Node.js 24, Yarn (via Corepack) e Vitest.
# - Executa "yarn test" (script: "vitest run").
# - Estruturado para facilitar expansão futura (ex.: novos jobs), mantendo apenas 1 job conforme restrições.

name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: "24" # Versão do Node.js definida como variável global para fácil manutenção
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} # Token do Vercel armazenado como segredo para segurança
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # ID do projeto Vercel para deploy
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }} # ID da organização Vercel para deploy
  VERCEL_SCOPE: paola-giseles-projects # Escopo do Vercel para deploy

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # Permissões mínimas necessárias para checkout

    steps:
      # Passo 1: Obter o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Passo 2: Preparar ambiente Node.js utilizando a versão global definida
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Passo 3: Habilitar Corepack para usar Yarn gerenciado pela versão do Node
      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Passo 4: Instalar dependências conforme yarn.lock
      - name: Install dependencies
        run: yarn install

      # Passo 5: Executar testes unitários com Vitest
      - name: Run unit tests
        run: yarn test

  build-and-deploy:
    name: Build and Deploy Vercel Preview
    needs: unit-tests
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.deployment-url }} # Captura a URL do preview do Vercel para uso posterior

    steps:
      # Passo 1: Obter o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Passo 2: Preparar ambiente Node.js utilizando a versão global definida
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Passo 3: Habilitar Corepack para usar Yarn gerenciado pela versão do Node
      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Passo 4: Instalar dependências conforme yarn.lock
      - name: Install dependencies
        run: yarn install

      # Passo 5: Obter as configurações do vercel
      - name: Pull Vercel Config
        run: |
          yarn vercel pull --yes \
          --environment=preview \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE

      # Passo 6: Build para o Vercel
      - name: Build for Vercel
        run: yarn vercel build --token=$VERCEL_TOKEN

      # Passo 7: Deploy preview no vercel
      - name: Deploy to preview
        id: deploy
        run: |
          URL=$(yarn vercel deploy --prebuilt \
          --target=preview \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-testes:
    name: Run End-to-End Tests
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Obter o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Passo 2: Preparar ambiente Node.js utilizando a versão global definida
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Passo 3: Habilitar Corepack para usar Yarn gerenciado pela versão do Node
      - name: Enable Corepack (Yarn)
        run: corepack enable

      # Passo 4: Instalar dependências conforme yarn.lock
      - name: Install dependencies
        run: yarn install

      # Passo 5: Instalação do Chromium para testes E2E
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      # Passo 6: Executar testes E2E com Playwright, utilizando a URL do preview do Vercel
      - name: Run E2E Regression Tests
        run: yarn playwright test playwright
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.preview-url }} # Passa a URL do preview do Vercel para os testes E2E via variável de ambiente
          DATABASE_URL: ${{ secrets.DATABASE_URL }} # Passa a URL do banco de dados para os testes E2E via variável de ambiente

      # Passo 7: Relatório de Testes Automatizados
      - name: Generate Test Report
        if: ${{ !cancelled() }} # Gera o relatório apenas se os testes não forem cancelados
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-test-report
          path: playwright-report/ # Caminho onde o Playwright gera os relatórios de teste, ajustável conforme configuração do Playwright

      # Passo 8: Publicar report Json do TestDino
      - name: Publish TestDino Report
        if: ${{ !cancelled() }} # Publica o relatório apenas se os testes não forem cancelados
        run: |
          npx tdpw upload ./playwright-report --token=${{ secrets.TD_TOKEN }}

  deploy-to-production:
    name: Build and Deploy to Production
    needs: [build-and-deploy, e2e-testes]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Pull Vercel Production Config
        run: |
          yarn vercel pull --yes \
          --environment=production \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE

      - name: Build for Production
        run: yarn vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy to Production
        run: yarn vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
